<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Axios Video Fact-Check Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b16;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-strong: rgba(255, 255, 255, 0.07);
      --stroke: rgba(220, 233, 255, 0.16);
      --stroke-strong: rgba(150, 188, 255, 0.36);
      --text: #f5f8ff;
      --muted: #9eadc8;
      --dim: #63728f;
      --blue: #1858ff;
      --blue-soft: #4d9fff;
      --teal: #18e7d0;
      --amber: #ffbd57;
      --red: #ff4c62;
      --ok: #57f2bd;
      --danger: #ff6677;
      --shadow-blue: 0 0 36px rgba(24, 88, 255, 0.28);
      --shadow-red: 0 0 36px rgba(255, 76, 98, 0.18);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 14%, rgba(24, 88, 255, 0.32), transparent 30rem),
        radial-gradient(circle at 87% 7%, rgba(255, 76, 98, 0.22), transparent 26rem),
        radial-gradient(circle at 64% 92%, rgba(24, 231, 208, 0.12), transparent 25rem),
        linear-gradient(145deg, #05070f 0%, #070b16 42%, #090d19 100%);
      overflow-x: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 78%);
    }

    body::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background: linear-gradient(180deg, rgba(7, 11, 22, 0) 0%, rgba(7, 11, 22, 0.52) 100%);
    }

    button,
    input,
    a {
      font: inherit;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .app-header {
      display: grid;
      gap: 18px;
      margin-bottom: 40px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .portal-title {
      margin: 0;
      font-family: "Chakra Petch", system-ui, sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #f8fbff;
      text-shadow: 0 0 18px rgba(77, 159, 255, 0.35);
    }

    .axios-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 116px;
      height: 40px;
      padding: 0 4px;
    }

    .axios-logo svg {
      display: block;
      width: auto;
      height: 40px;
      filter: drop-shadow(0 0 14px rgba(77, 159, 255, 0.42));
    }

    .gradient-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--teal), var(--blue-soft), var(--amber), var(--red));
      box-shadow: 0 0 20px rgba(77, 159, 255, 0.45);
    }

    main {
      display: grid;
      gap: 22px;
    }

    .console-frame {
      display: grid;
      gap: 22px;
      max-width: 920px;
      margin: 0 auto;
      width: 100%;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.062), rgba(255, 255, 255, 0.032));
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        var(--shadow-blue);
      backdrop-filter: blur(22px);
    }

    .panel::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        radial-gradient(circle at 9% 0%, rgba(77, 159, 255, 0.18), transparent 18rem),
        radial-gradient(circle at 94% 100%, rgba(255, 76, 98, 0.12), transparent 18rem);
      opacity: 0.9;
    }

    .panel-inner {
      position: relative;
      padding: clamp(20px, 4vw, 34px);
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .panel-heading h2 {
      margin: 0;
      font-family: "Chakra Petch", system-ui, sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .panel-kicker {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .dropzone {
      display: grid;
      min-height: 220px;
      place-items: center;
      padding: 26px;
      border: 1px dashed rgba(151, 188, 255, 0.42);
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(24, 88, 255, 0.12), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease,
        background 180ms ease,
        opacity 180ms ease;
    }

    .dropzone:hover,
    .dropzone.is-dragging {
      transform: translateY(-2px);
      border-color: rgba(77, 159, 255, 0.9);
      background:
        linear-gradient(135deg, rgba(24, 88, 255, 0.2), rgba(24, 231, 208, 0.07)),
        rgba(255, 255, 255, 0.045);
      box-shadow: 0 0 34px rgba(24, 88, 255, 0.22);
    }

    .dropzone[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none;
    }

    .dropzone-content {
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
    }

    .upload-mark {
      display: grid;
      width: 64px;
      height: 64px;
      place-items: center;
      border: 1px solid rgba(77, 159, 255, 0.42);
      border-radius: 50%;
      background: rgba(24, 88, 255, 0.13);
      box-shadow: inset 0 0 22px rgba(77, 159, 255, 0.13), 0 0 28px rgba(24, 88, 255, 0.26);
    }

    .upload-mark svg {
      width: 31px;
      height: 31px;
      stroke: #d8e6ff;
      stroke-width: 1.8;
      fill: none;
    }

    .drop-title {
      margin: 0;
      font-family: "Chakra Petch", system-ui, sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .drop-subtitle,
    .file-meta,
    .panel-note,
    .job-line {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .selected-file {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      max-width: 100%;
      margin-top: 3px;
      padding: 9px 13px;
      border: 1px solid rgba(77, 159, 255, 0.24);
      border-radius: 999px;
      background: rgba(24, 88, 255, 0.1);
      color: #dbe8ff;
    }

    .selected-file.is-visible {
      display: flex;
    }

    .selected-file strong {
      overflow: hidden;
      max-width: min(440px, 58vw);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error-text {
      min-height: 1.4em;
      margin: 14px 0 0;
      color: var(--danger);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0;
      text-decoration: none;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.065);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        border-color 160ms ease,
        background 160ms ease,
        opacity 160ms ease;
    }

    .button:hover:not(:disabled),
    .button:focus-visible:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(77, 159, 255, 0.72);
      box-shadow: 0 0 24px rgba(77, 159, 255, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .button:disabled,
    .button.is-disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .button.primary {
      border-color: rgba(77, 159, 255, 0.58);
      background: linear-gradient(135deg, var(--blue), var(--blue-soft));
      color: #fff;
      box-shadow: 0 0 24px rgba(24, 88, 255, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .button.primary.is-processing {
      animation: button-pulse 1.45s ease-in-out infinite;
    }

    .button.danger {
      border-color: rgba(255, 102, 119, 0.5);
      color: #ffe0e5;
      background: rgba(255, 76, 98, 0.12);
    }

    .status-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: center;
    }

    .status-readout {
      margin: 0;
      font-family: "Orbitron", system-ui, sans-serif;
      font-size: 2.35rem;
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #eaf2ff;
      text-shadow:
        0 0 18px rgba(77, 159, 255, 0.62),
        0 0 38px rgba(24, 88, 255, 0.28);
      overflow-wrap: anywhere;
    }

    .status-readout.is-error {
      color: #ffd7dd;
      text-shadow:
        0 0 18px rgba(255, 76, 98, 0.62),
        0 0 36px rgba(255, 76, 98, 0.22);
    }

    .orb {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 32%, #f9fdff 0 5%, #8bc4ff 14%, #1858ff 38%, rgba(24, 88, 255, 0.2) 67%, transparent 70%);
      box-shadow:
        0 0 22px rgba(77, 159, 255, 0.64),
        0 0 64px rgba(24, 88, 255, 0.34),
        inset 0 0 20px rgba(255, 255, 255, 0.18);
      animation: orb-pulse 1.8s ease-in-out infinite;
    }

    .orb::before,
    .orb::after {
      position: absolute;
      inset: -7px;
      border: 1px solid rgba(77, 159, 255, 0.32);
      border-radius: inherit;
      content: "";
      animation: orbit 2.8s linear infinite;
    }

    .orb::after {
      inset: -14px;
      border-color: rgba(255, 76, 98, 0.22);
      animation-duration: 4.1s;
      animation-direction: reverse;
    }

    .progress {
      overflow: hidden;
      height: 8px;
      margin: 24px 0 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.075);
    }

    .progress span {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue-soft), var(--amber), var(--red));
      box-shadow: 0 0 22px rgba(77, 159, 255, 0.48);
      animation: scan 1.35s ease-in-out infinite;
    }

    .telemetry {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .metric {
      min-width: 0;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric-label {
      margin: 0 0 5px;
      color: var(--dim);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .panel-heading-title {
      margin: 0;
      font-family: "Chakra Petch", system-ui, sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .metric-value {
      margin: 0;
      overflow: hidden;
      font-family: "Orbitron", system-ui, sans-serif;
      color: #eef5ff;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .report-frame-wrap {
      overflow: hidden;
      border: 1px solid rgba(220, 233, 255, 0.14);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.25);
      box-shadow: inset 0 0 28px rgba(0, 0, 0, 0.28);
    }

    .report-frame {
      display: block;
      width: 100%;
      height: 70vh;
      min-height: 520px;
      border: 0;
      background: #fff;
    }

    .hidden {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes button-pulse {
      0%, 100% {
        box-shadow: 0 0 24px rgba(24, 88, 255, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      50% {
        box-shadow: 0 0 42px rgba(77, 159, 255, 0.58), 0 0 80px rgba(24, 88, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
    }

    @keyframes orb-pulse {
      0%, 100% {
        transform: scale(0.96);
        opacity: 0.78;
      }
      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    @keyframes orbit {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes scan {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(260%);
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 22px, 1180px);
        padding-top: 20px;
      }

      .portal-title {
        font-size: 1.08rem;
      }

      .panel-heading h2,
      .panel-heading-title,
      .drop-title {
        font-size: 1.12rem;
      }

      .status-readout {
        font-size: 1.48rem;
      }

      .header-top,
      .panel-heading,
      .result-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .axios-logo {
        align-self: flex-end;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .orb {
        justify-self: center;
      }

      .telemetry {
        grid-template-columns: 1fr;
      }

      .actions,
      .result-toolbar {
        width: 100%;
      }

      .button {
        width: 100%;
      }

      .report-frame {
        height: 68vh;
        min-height: 420px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="app-header">
      <div class="header-top">
        <h1 class="portal-title">Fact-Check Portal</h1>
        <div class="axios-logo" aria-label="Axios">
          <svg viewBox="0 0 240 78" role="img" aria-labelledby="axiosLogoTitle">
            <title id="axiosLogoTitle">Axios</title>
            <defs>
              <linearGradient id="axiosGradient" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#f8fbff"></stop>
                <stop offset="0.48" stop-color="#4d9fff"></stop>
                <stop offset="1" stop-color="#1858ff"></stop>
              </linearGradient>
            </defs>
            <path d="M26 66 67 12h24L50 66H26Z" fill="url(#axiosGradient)"></path>
            <path d="M73 66 114 12h24L97 66H73Z" fill="#f7fbff" opacity="0.95"></path>
            <text x="120" y="54" fill="#f7fbff" font-family="Arial Black, Arial, sans-serif" font-size="43" font-weight="900" letter-spacing="0">Axios</text>
          </svg>
        </div>
      </div>
      <div class="gradient-line" aria-hidden="true"></div>
    </header>

    <main>
      <div class="console-frame">
        <section class="panel" aria-labelledby="uploadHeading" id="uploadPanel">
          <div class="panel-inner">
            <div class="panel-heading">
              <h2 id="uploadHeading">Transcript Intake</h2>
              <p class="panel-kicker">TXT upload</p>
            </div>

            <input class="sr-only" id="fileInput" type="file" accept=".txt">
            <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-disabled="false" aria-describedby="uploadError">
              <div class="dropzone-content">
                <span class="upload-mark" aria-hidden="true">
                  <svg viewBox="0 0 32 32">
                    <path d="M16 22V7"></path>
                    <path d="m10 13 6-6 6 6"></path>
                    <path d="M7 24.5h18"></path>
                  </svg>
                </span>
                <p class="drop-title">Drop transcript file</p>
                <p class="drop-subtitle">or browse for a .txt file</p>
                <div class="selected-file" id="selectedFile">
                  <strong id="fileName"></strong>
                  <span class="file-meta" id="fileSize"></span>
                </div>
              </div>
            </div>

            <p class="error-text" id="uploadError" role="status"></p>

            <div class="actions">
              <button class="button primary" type="button" id="submitButton" disabled>Run Fact-Check</button>
            </div>
          </div>
        </section>

        <section class="panel hidden" aria-labelledby="statusHeading" id="statusPanel">
          <div class="panel-inner">
            <div class="panel-heading">
              <h2 id="statusHeading">Processing Status</h2>
              <p class="panel-kicker">Live job telemetry</p>
            </div>

            <div class="status-grid">
              <p class="status-readout" id="statusReadout">JOB QUEUED</p>
              <div class="orb" id="statusOrb" aria-hidden="true"></div>
            </div>

            <div class="progress" id="progressBar" aria-hidden="true"><span></span></div>
            <p class="job-line" id="statusMessage">Waiting for analysis window.</p>

            <div class="telemetry">
              <div class="metric">
                <p class="metric-label">Elapsed</p>
                <p class="metric-value" id="elapsedTime">00:00</p>
              </div>
              <div class="metric">
                <p class="metric-label">Job ID</p>
                <p class="metric-value" id="jobIdValue">-</p>
              </div>
              <div class="metric">
                <p class="metric-label">Polls</p>
                <p class="metric-value" id="pollCount">0 / 120</p>
              </div>
            </div>

            <div class="actions hidden" id="statusActions">
              <button class="button primary hidden" type="button" id="checkAgainButton">Check again</button>
              <button class="button danger hidden" type="button" id="tryAgainButton">Try again</button>
            </div>
          </div>
        </section>

        <section class="panel hidden" aria-labelledby="resultHeading" id="resultPanel">
          <div class="panel-inner">
            <div class="result-toolbar">
              <div>
                <h2 id="resultHeading" class="panel-heading-title">Fact-Check Report</h2>
                <p class="panel-note" id="resultFilename">axios-fact-check-report.html</p>
              </div>
              <div class="actions" style="margin-top: 0;">
                <a class="button primary" id="downloadLink" href="#" download="axios-fact-check-report.html">Download Report</a>
                <button class="button" type="button" id="resetButton">Run another</button>
              </div>
            </div>

            <div class="report-frame-wrap">
              <iframe class="report-frame" id="reportFrame" title="Fact-check report preview" sandbox="allow-scripts allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation" referrerpolicy="no-referrer"></iframe>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (() => {
      const SUBMIT_URL = "https://n8n.automail-ai.com/webhook/axios-video-fact-check";
      const POLL_URL = "https://n8n.automail-ai.com/webhook/axios-fact-check-polling";
      const INITIAL_POLL_DELAY_MS = 10000;
      const POLL_INTERVAL_MS = 60000;
      const MAX_POLL_ATTEMPTS = 120;
      const FALLBACK_UPLOAD_FILENAME = "transcript.txt";
      const REPORT_FILENAME_PREFIX = "axios-fact-check-";
      const DEFAULT_REPORT_NAME = "axios-fact-check-report.html";

      const els = {
        fileInput: document.getElementById("fileInput"),
        dropzone: document.getElementById("dropzone"),
        selectedFile: document.getElementById("selectedFile"),
        fileName: document.getElementById("fileName"),
        fileSize: document.getElementById("fileSize"),
        uploadError: document.getElementById("uploadError"),
        submitButton: document.getElementById("submitButton"),
        statusPanel: document.getElementById("statusPanel"),
        statusReadout: document.getElementById("statusReadout"),
        statusOrb: document.getElementById("statusOrb"),
        progressBar: document.getElementById("progressBar"),
        statusMessage: document.getElementById("statusMessage"),
        elapsedTime: document.getElementById("elapsedTime"),
        jobIdValue: document.getElementById("jobIdValue"),
        pollCount: document.getElementById("pollCount"),
        statusActions: document.getElementById("statusActions"),
        checkAgainButton: document.getElementById("checkAgainButton"),
        tryAgainButton: document.getElementById("tryAgainButton"),
        resultPanel: document.getElementById("resultPanel"),
        resultFilename: document.getElementById("resultFilename"),
        downloadLink: document.getElementById("downloadLink"),
        resetButton: document.getElementById("resetButton"),
        reportFrame: document.getElementById("reportFrame")
      };

      const state = {
        file: null,
        jobId: "",
        mode: "idle",
        pollAttempts: 0,
        pollTimer: null,
        elapsedTimer: null,
        startedAt: 0,
        reportUrl: "",
        reportHtml: "",
        downloadName: DEFAULT_REPORT_NAME
      };

      const runningReadouts = [
        "ANALYZING TRANSCRIPT...",
        "CHECKING CLAIMS...",
        "VERIFYING SOURCES...",
        "ASSEMBLING REPORT..."
      ];

      els.dropzone.addEventListener("click", () => {
        if (!isBusy()) {
          els.fileInput.click();
        }
      });

      els.dropzone.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === " ") && !isBusy()) {
          event.preventDefault();
          els.fileInput.click();
        }
      });

      els.dropzone.addEventListener("dragover", (event) => {
        event.preventDefault();
        if (!isBusy()) {
          els.dropzone.classList.add("is-dragging");
        }
      });

      els.dropzone.addEventListener("dragleave", () => {
        els.dropzone.classList.remove("is-dragging");
      });

      els.dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        els.dropzone.classList.remove("is-dragging");
        if (isBusy()) {
          return;
        }

        const [file] = Array.from(event.dataTransfer.files || []);
        selectFile(file);
      });

      els.fileInput.addEventListener("change", () => {
        const [file] = Array.from(els.fileInput.files || []);
        selectFile(file);
      });

      els.submitButton.addEventListener("click", submitJob);
      els.tryAgainButton.addEventListener("click", submitJob);
      els.checkAgainButton.addEventListener("click", resumeManualPolling);
      els.downloadLink.addEventListener("click", downloadReport);
      els.resetButton.addEventListener("click", resetAll);

      function selectFile(file) {
        clearUploadError();

        if (!file) {
          showUploadError("Choose a transcript text file before running the fact-check.");
          updateFileUi();
          return;
        }

        if (!file.name.toLowerCase().endsWith(".txt")) {
          showUploadError("That file type is not supported. Please choose a .txt transcript.");
          els.fileInput.value = "";
          state.file = null;
          updateFileUi();
          return;
        }

        if (file.size === 0) {
          showUploadError("That transcript file is empty. Please choose a .txt file with transcript text.");
          els.fileInput.value = "";
          state.file = null;
          updateFileUi();
          return;
        }

        state.file = file;
        updateFileUi();
      }

      function updateFileUi() {
        const hasFile = Boolean(state.file);
        els.selectedFile.classList.toggle("is-visible", hasFile);
        els.fileName.textContent = hasFile ? state.file.name : "";
        els.fileSize.textContent = hasFile ? formatBytes(state.file.size) : "";
        els.submitButton.disabled = !hasFile || isBusy();
      }

      async function submitJob() {
        if (!state.file) {
          showUploadError("Choose a transcript text file before running the fact-check.");
          return;
        }

        if (state.file.size === 0) {
          showUploadError("That transcript file is empty. Please choose a .txt file with transcript text.");
          return;
        }

        prepareForNewRun();
        setMode("submitting");
        showStatus("SUBMITTING...", "Uploading transcript to the fact-check queue.", false);
        startElapsedTimer();

        try {
          const fd = new FormData();
          fd.append("file", state.file, state.file.name || FALLBACK_UPLOAD_FILENAME);

          const response = await fetch(SUBMIT_URL, {
            method: "POST",
            body: fd
          });

          const data = await readJsonResponse(response, "submit");
          if (!data || typeof data.job_id !== "string" || !data.job_id.trim()) {
            throw new Error("The upload succeeded, but the backend did not return a job_id.");
          }

          state.jobId = data.job_id.trim();
          state.pollAttempts = 0;
          els.jobIdValue.textContent = state.jobId;
          setMode("running");
          showStatus("JOB QUEUED", "First status check starts in about 10 seconds.", false);
          schedulePoll(INITIAL_POLL_DELAY_MS);
        } catch (error) {
          showFailure(getFriendlyError(error), true);
        }
      }

      function schedulePoll(delayMs) {
        clearPollTimer();
        state.pollTimer = window.setTimeout(pollJob, delayMs);
      }

      function buildPollUrl(jobId) {
        const url = new URL(POLL_URL);
        url.searchParams.set("job_id", jobId);
        return url.toString();
      }

      async function pollJob() {
        if (!state.jobId || state.mode !== "running") {
          return;
        }

        if (state.pollAttempts >= MAX_POLL_ATTEMPTS) {
          showPollingLimit();
          return;
        }

        state.pollAttempts += 1;
        updatePollCount();
        showStatus(runningReadouts[(state.pollAttempts - 1) % runningReadouts.length], "Polling backend for the finished report.", false);

        let data;
        try {
          const response = await fetch(buildPollUrl(state.jobId), {
            method: "GET",
            cache: "no-store"
          });

          data = await readPollResponse(response);
        } catch (error) {
          handleTransientPollIssue(error);
          return;
        }

        const status = normalizeStatus(data.status);

        if (status === "running") {
          showStatus(runningReadouts[state.pollAttempts % runningReadouts.length], "Still processing. Next automatic check is scheduled.", false);
          schedulePoll(POLL_INTERVAL_MS);
          return;
        }

        if (status === "complete") {
          try {
            const html = getHtmlFromCompleteResponse(data);
            renderResult(html, getFilenameFromCompleteResponse(data));
          } catch (error) {
            showFailure(getFriendlyError(error), true);
          }
          return;
        }

        if (status === "error") {
          const message = typeof data.message === "string" && data.message.trim()
            ? data.message.trim()
            : "The backend reported an error while processing this transcript.";
          showFailure(message, true);
          return;
        }

        showStatus(runningReadouts[state.pollAttempts % runningReadouts.length], "Received an in-progress response. Next automatic check is scheduled.", false);
        schedulePoll(POLL_INTERVAL_MS);
      }

      async function readJsonResponse(response, phase) {
        const text = await response.text();
        if (!response.ok) {
          throw new Error(`${phase === "submit" ? "Upload" : "Request"} failed with HTTP ${response.status}${text ? `: ${text.slice(0, 180)}` : "."}`);
        }

        try {
          return JSON.parse(text);
        } catch {
          throw new Error("The backend response was not valid JSON.");
        }
      }

      async function readPollResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        const contentDisposition = response.headers.get("content-disposition") || "";
        const filename = getFilenameFromContentDisposition(contentDisposition);
        const text = await response.text();
        const trimmedText = text.trim();

        if (!trimmedText || isStillRunningResponse(trimmedText)) {
          return { status: "running" };
        }

        if (isReportFileResponse(trimmedText, contentType, contentDisposition, filename)) {
          return {
            status: "complete",
            filename,
            html: text
          };
        }

        let data;
        try {
          data = normalizePollPayload(JSON.parse(trimmedText));
        } catch {
          return { status: "running" };
        }

        const binaryReport = getReportFromBinaryData(data);
        if (binaryReport) {
          return {
            status: "complete",
            ...binaryReport
          };
        }

        const status = normalizeStatus(data.status);
        if (status === "complete") {
          return { status: "running" };
        }

        if (!response.ok && status !== "running" && status !== "complete" && status !== "error") {
          return { status: "running" };
        }

        return data;
      }

      function normalizePollPayload(payload) {
        if (Array.isArray(payload)) {
          return payload[0] || { status: "running" };
        }

        return payload && typeof payload === "object"
          ? payload
          : { status: "running" };
      }

      function isStillRunningResponse(text) {
        const normalized = text.trim().toLowerCase();
        return normalized === "still running" || normalized === "\"still running\"";
      }

      function isReportFileResponse(text, contentType, contentDisposition, filename) {
        const lowerContentType = contentType.toLowerCase();
        const lowerContentDisposition = contentDisposition.toLowerCase();
        const lowerFilename = filename.toLowerCase();
        const lowerStart = text.slice(0, 240).toLowerCase();
        const hasFileHeader = lowerContentDisposition.includes("attachment")
          || lowerContentDisposition.includes("filename=")
          || lowerFilename.endsWith(".html");
        const hasBinaryContentType = lowerContentType.includes("application/octet-stream")
          || lowerContentType.includes("application/x-download");
        const hasHtmlContentType = lowerContentType.includes("text/html");
        const looksLikeHtmlReport = lowerStart.startsWith("<!doctype html")
          || lowerStart.startsWith("<html");

        return looksLikeHtmlReport && (hasFileHeader || hasBinaryContentType || hasHtmlContentType);
      }

      function getFilenameFromContentDisposition(contentDisposition) {
        const utf8Match = contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match) {
          return decodeURIComponent(utf8Match[1].trim().replace(/^["']|["']$/g, ""));
        }

        const asciiMatch = contentDisposition.match(/filename="?([^";]+)"?/i);
        return asciiMatch ? asciiMatch[1].trim() : "";
      }

      function normalizeStatus(status) {
        return typeof status === "string" ? status.trim().toLowerCase() : "";
      }

      function getReportFromBinaryData(payload) {
        const dataBinary = getDataBinary(payload);
        if (!dataBinary) {
          return null;
        }

        const filename = getBinaryFilename(dataBinary);
        const mimeType = typeof dataBinary.mimeType === "string" ? dataBinary.mimeType.toLowerCase() : "";
        const fileExtension = typeof dataBinary.fileExtension === "string" ? dataBinary.fileExtension.toLowerCase() : "";
        const looksLikeReport = mimeType.includes("text/html")
          || fileExtension === "html"
          || filename.toLowerCase().startsWith(REPORT_FILENAME_PREFIX);

        if (!looksLikeReport || typeof dataBinary.data !== "string" || !dataBinary.data.trim()) {
          return null;
        }

        const htmlData = dataBinary.data.trim();
        return htmlData.startsWith("<")
          ? { filename, html: dataBinary.data }
          : { filename, html_base64: htmlData };
      }

      function getDataBinary(payload) {
        if (!payload || typeof payload !== "object") {
          return null;
        }

        if (payload.binary && payload.binary.data && typeof payload.binary.data === "object") {
          return payload.binary.data;
        }

        if (typeof payload.data === "string") {
          return payload;
        }

        if (payload.data && typeof payload.data === "object" && typeof payload.data.data === "string") {
          return payload.data;
        }

        return null;
      }

      function getBinaryFilename(dataBinary) {
        return dataBinary.fileName
          || dataBinary.filename
          || dataBinary.name
          || getDefaultReportName();
      }

      function getHtmlFromCompleteResponse(data) {
        if (typeof data.html === "string" && data.html.length > 0) {
          return data.html;
        }

        if (typeof data.HTML === "string" && data.HTML.length > 0) {
          return data.HTML;
        }

        if (typeof data.html_text === "string" && data.html_text.length > 0) {
          return data.html_text;
        }

        if (typeof data.html_base64 === "string" && data.html_base64.length > 0) {
          return decodeBase64Utf8(data.html_base64);
        }

        throw new Error("The job completed, but no HTML report was included.");
      }

      function getFilenameFromCompleteResponse(data) {
        return data.filename || data.file_name || data.name || getDefaultReportName();
      }

      function getDefaultReportName() {
        return state.jobId ? `${REPORT_FILENAME_PREFIX}${state.jobId}.html` : DEFAULT_REPORT_NAME;
      }

      function decodeBase64Utf8(value) {
        const base64 = value.startsWith("data:") && value.includes(",")
          ? value.slice(value.indexOf(",") + 1)
          : value;
        const binary = window.atob(base64);
        const bytes = Uint8Array.from(binary, (character) => character.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      function renderResult(htmlString, filename) {
        stopTimers();
        setMode("complete");

        if (state.reportUrl) {
          URL.revokeObjectURL(state.reportUrl);
        }

        const previewHtml = makeReportLinksClickable(htmlString);
        const blob = new Blob([previewHtml], { type: "text/html" });
        state.reportUrl = URL.createObjectURL(blob);
        const downloadName = sanitizeFilename(filename) || getDefaultReportName();
        state.reportHtml = previewHtml;
        state.downloadName = downloadName;

        els.reportFrame.src = state.reportUrl;
        els.downloadLink.href = state.reportUrl;
        els.downloadLink.download = downloadName;
        els.resultFilename.textContent = downloadName;
        els.resultPanel.classList.remove("hidden");
        els.statusPanel.classList.add("hidden");
        els.resultPanel.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function makeReportLinksClickable(htmlString) {
        try {
          const documentParser = new DOMParser();
          const reportDocument = documentParser.parseFromString(htmlString, "text/html");
          reportDocument.querySelectorAll("a[href]").forEach((link) => {
            const href = link.getAttribute("href") || "";
            if (!href.startsWith("#")) {
              link.target = "_blank";
              link.rel = "noopener noreferrer";
            }
          });
          return `<!doctype html>${reportDocument.documentElement.outerHTML}`;
        } catch {
          return htmlString;
        }
      }

      function downloadReport(event) {
        event.preventDefault();

        if (!state.reportHtml) {
          return;
        }

        const downloadName = sanitizeFilename(state.downloadName) || getDefaultReportName();
        const downloadBlob = new Blob([state.reportHtml], { type: "application/octet-stream" });
        const downloadUrl = URL.createObjectURL(downloadBlob);
        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = downloadName;
        link.rel = "noopener";
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
      }

      function showPollingLimit() {
        stopTimers();
        setMode("paused");
        showStatus("CHECK NEEDED", "This is taking longer than expected. You can manually check the job again.", true);
        els.checkAgainButton.classList.remove("hidden");
        els.tryAgainButton.classList.add("hidden");
        els.statusActions.classList.remove("hidden");
      }

      function resumeManualPolling() {
        if (!state.jobId) {
          showFailure("No active job_id is available. Please run the fact-check again.", true);
          return;
        }

        state.pollAttempts = 0;
        updatePollCount();
        setMode("running");
        showStatus("CHECKING AGAIN", "Manual polling has resumed.", false);
        startElapsedTimer();
        schedulePoll(0);
      }

      function handleTransientPollIssue(error) {
        if (state.pollAttempts >= MAX_POLL_ATTEMPTS) {
          showPollingLimit();
          return;
        }

        const message = error instanceof TypeError
          ? "The status endpoint is not readable yet. The job may still be running, so the next check is scheduled."
          : "The status check was inconclusive. The job may still be running, so the next check is scheduled.";

        els.statusActions.classList.add("hidden");
        els.tryAgainButton.classList.add("hidden");
        els.checkAgainButton.classList.add("hidden");
        showStatus(runningReadouts[state.pollAttempts % runningReadouts.length], message, false);
        schedulePoll(POLL_INTERVAL_MS);
      }

      function showFailure(message, canRetry) {
        stopTimers();
        setMode("error");
        showStatus("ERROR", message, true);
        els.tryAgainButton.classList.toggle("hidden", !canRetry);
        els.checkAgainButton.classList.add("hidden");
        els.statusActions.classList.toggle("hidden", !canRetry);
      }

      function showStatus(readout, message, isError) {
        els.statusPanel.classList.remove("hidden");
        els.statusReadout.textContent = readout;
        els.statusReadout.classList.toggle("is-error", isError);
        els.statusMessage.textContent = message;
        els.statusOrb.classList.toggle("hidden", isError || state.mode === "paused");
        els.progressBar.classList.toggle("hidden", isError || state.mode === "paused");
        updatePollCount();
      }

      function setMode(mode) {
        state.mode = mode;
        const busy = isBusy();
        els.dropzone.setAttribute("aria-disabled", String(busy));
        els.submitButton.disabled = !state.file || busy;
        els.submitButton.classList.toggle("is-processing", busy);
      }

      function isBusy() {
        return state.mode === "submitting" || state.mode === "running";
      }

      function prepareForNewRun() {
        clearUploadError();
        stopTimers();
        state.jobId = "";
        state.pollAttempts = 0;
        state.startedAt = 0;
        state.reportHtml = "";
        state.downloadName = DEFAULT_REPORT_NAME;
        els.jobIdValue.textContent = "-";
        els.elapsedTime.textContent = "00:00";
        els.pollCount.textContent = `0 / ${MAX_POLL_ATTEMPTS}`;
        els.statusActions.classList.add("hidden");
        els.tryAgainButton.classList.add("hidden");
        els.checkAgainButton.classList.add("hidden");
        els.resultPanel.classList.add("hidden");
        els.reportFrame.removeAttribute("src");
        if (state.reportUrl) {
          URL.revokeObjectURL(state.reportUrl);
          state.reportUrl = "";
        }
      }

      function resetAll() {
        stopTimers();
        if (state.reportUrl) {
          URL.revokeObjectURL(state.reportUrl);
        }

        state.file = null;
        state.jobId = "";
        state.mode = "idle";
        state.pollAttempts = 0;
        state.startedAt = 0;
        state.reportUrl = "";
        state.reportHtml = "";
        state.downloadName = DEFAULT_REPORT_NAME;
        els.fileInput.value = "";
        els.reportFrame.removeAttribute("src");
        els.statusPanel.classList.add("hidden");
        els.resultPanel.classList.add("hidden");
        els.statusActions.classList.add("hidden");
        els.tryAgainButton.classList.add("hidden");
        els.checkAgainButton.classList.add("hidden");
        els.statusReadout.classList.remove("is-error");
        els.elapsedTime.textContent = "00:00";
        els.jobIdValue.textContent = "-";
        clearUploadError();
        setMode("idle");
        updateFileUi();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function startElapsedTimer() {
        if (!state.startedAt) {
          state.startedAt = Date.now();
        }
        clearElapsedTimer();
        updateElapsedTime();
        state.elapsedTimer = window.setInterval(updateElapsedTime, 1000);
      }

      function updateElapsedTime() {
        if (!state.startedAt) {
          els.elapsedTime.textContent = "00:00";
          return;
        }

        const totalSeconds = Math.max(0, Math.floor((Date.now() - state.startedAt) / 1000));
        const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        els.elapsedTime.textContent = `${minutes}:${seconds}`;
      }

      function updatePollCount() {
        els.pollCount.textContent = `${state.pollAttempts} / ${MAX_POLL_ATTEMPTS}`;
      }

      function stopTimers() {
        clearPollTimer();
        clearElapsedTimer();
      }

      function clearPollTimer() {
        if (state.pollTimer) {
          window.clearTimeout(state.pollTimer);
          state.pollTimer = null;
        }
      }

      function clearElapsedTimer() {
        if (state.elapsedTimer) {
          window.clearInterval(state.elapsedTimer);
          state.elapsedTimer = null;
        }
      }

      function showUploadError(message) {
        els.uploadError.textContent = message;
      }

      function clearUploadError() {
        els.uploadError.textContent = "";
      }

      function getFriendlyError(error) {
        if (error instanceof TypeError) {
          return "Network request failed. Check the connection and try again.";
        }

        return error && error.message
          ? error.message
          : "Something went wrong while processing this transcript.";
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes)) {
          return "";
        }

        if (bytes < 1024) {
          return `${bytes} B`;
        }

        const units = ["KB", "MB", "GB"];
        let value = bytes / 1024;
        let unitIndex = 0;

        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }

        return `${value.toFixed(value >= 10 ? 1 : 2)} ${units[unitIndex]}`;
      }

      function sanitizeFilename(filename) {
        if (typeof filename !== "string") {
          return "";
        }

        const lastSegment = filename.split(/[\\/]/).pop().trim();
        return lastSegment || "";
      }

      updateFileUi();
    })();
  </script>
</body>
</html>
